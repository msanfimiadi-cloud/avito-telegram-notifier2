services:
  app:
    build: .
    container_name: avito-telegram-notifier
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  app-data:
